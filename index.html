<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kopken Luxury Voucher</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background:linear-gradient(135deg,#1e1a18,#2b221f);
  color:#fff;
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:30px 15px;
}

.container{
  width:100%;
  max-width:550px;
}

.header{
  text-align:center;
  margin-bottom:25px;
}

.badge{
  background:gold;
  color:#000;
  display:inline-block;
  padding:6px 15px;
  border-radius:999px;
  font-size:12px;
  margin-bottom:10px;
}

.header h1{
  font-size:22px;
}

.menu{
  display:grid;
  gap:14px;
  margin-bottom:25px;
}

.card{
  background:#2f2522;
  padding:12px;
  border-radius:18px;
  display:flex;
  align-items:center;
  gap:12px;
  transition:0.3s;
}

.card:hover{
  background:#3a2e2a;
  transform:translateY(-3px);
}

.card img{
  width:65px;
  height:65px;
  border-radius:12px;
  object-fit:cover;
}

.card-info{
  flex:1;
}

.card-info h3{
  font-size:14px;
}

.price{
  font-size:13px;
  color:gold;
}

.qty-btn{
  display:flex;
  align-items:center;
  gap:8px;
}

.qty-btn button{
  background:gold;
  border:none;
  width:28px;
  height:28px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.cart{
  background:#2f2522;
  padding:18px;
  border-radius:18px;
}

.cart h2{
  margin-bottom:10px;
  font-size:16px;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-bottom:6px;
}

.total{
  font-weight:700;
  margin-top:10px;
}

.checkout{
  width:100%;
  margin-top:15px;
  padding:12px;
  background:gold;
  border:none;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="badge">Voucher 50%</div>
    <h1>Kopi Kenangan Small Cup</h1>
  </div>

  <div class="menu" id="menuList"></div>

  <div class="cart">
    <h2>Keranjang</h2>
    <div id="cartItems"></div>
    <div class="total">Total: Rp <span id="totalPrice">0</span></div>
    <button class="checkout" onclick="checkout()">Checkout via WhatsApp</button>
  </div>

</div>

<script>
const phone = "628XXXXXXXXXX"; // GANTI NOMOR

// ====== DAFTAR MENU ======
const menuData = [
  {name:"Americano", price:14000, img:"images/americano.jpg"},
  {name:"Kopi Kenangan Mantan", price:15000, img:"images/kopken.jpg"},
  {name:"Thai Tea", price:17000, img:"images/thai-tea.jpg"},
  {name:"Cappuccino", price:17000, img:"images/cappuccino.jpg"},
  {name:"Latte", price:17000, img:"images/latte.jpg"},
  {name:"Vanilla Latte", price:18000, img:"images/vanilla.jpg"},
  {name:"Hazelnut Latte", price:18000, img:"images/hazelnut.jpg"},
  {name:"Caramel Macchiato", price:19000, img:"images/caramel.jpg"},
  {name:"Matcha Latte", price:18000, img:"images/matcha.jpg"},
  {name:"Avocado Caramel", price:19000, img:"images/avocado.jpg"}
];

// ====== LOAD CART DARI LOCAL STORAGE ======
let cart = JSON.parse(localStorage.getItem("cart")) || {};

// ====== RENDER MENU ======
const menuList = document.getElementById("menuList");

menuData.forEach(item=>{
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${item.img}">
    <div class="card-info">
      <h3>${item.name}</h3>
      <div class="price">Rp ${item.price}</div>
    </div>
    <div class="qty-btn">
      <button onclick="changeQty('${item.name}', -1)">-</button>
      <span id="qty-${item.name}">${cart[item.name] || 0}</span>
      <button onclick="changeQty('${item.name}', 1)">+</button>
    </div>
  `;

  menuList.appendChild(card);
});

// ====== UBAH QTY ======
function changeQty(name, amount){
  if(!cart[name]) cart[name] = 0;
  cart[name] += amount;

  if(cart[name] <= 0) delete cart[name];

  localStorage.setItem("cart", JSON.stringify(cart));
  updateUI();
}

// ====== UPDATE UI CART ======
function updateUI(){
  const container = document.getElementById("cartItems");
  container.innerHTML = "";
  let total = 0;

  menuData.forEach(item=>{
    const qty = cart[item.name] || 0;
    const qtySpan = document.getElementById(`qty-${item.name}`);
    if(qtySpan) qtySpan.innerText = qty;

    if(qty > 0){
      const subtotal = qty * item.price;
      total += subtotal;

      container.innerHTML += `
        <div class="cart-item">
          <span>${item.name} x${qty}</span>
          <span>Rp ${subtotal}</span>
        </div>
      `;
    }
  });

  document.getElementById("totalPrice").innerText = total;
}

updateUI();

// ====== CHECKOUT ======
function checkout(){
  if(Object.keys(cart).length === 0){
    alert("Keranjang kosong.");
    return;
  }

  let message = "Halo, saya mau order:%0A";
  let total = 0;

  menuData.forEach(item=>{
    const qty = cart[item.name];
    if(qty){
      const subtotal = qty * item.price;
      total += subtotal;
      message += `- ${item.name} x${qty} (Rp ${subtotal})%0A`;
    }
  });

  message += `%0ATotal: Rp ${total}`;

  window.open(`https://wa.me/${phone}?text=${message}`, "_blank");
}
</script>

</body>
</html>
