<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kopken Luxury Order</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-color: #FAF6F0; /* Krem sangat lembut */
        --card-bg: #FFFFFF;
        --text-dark: #4A3A36; /* Cokelat gelap */
        --text-light: #8B7A75; /* Cokelat pudar */
        --accent: #C28C65; /* Karamel / Cokelat susu */
        --accent-hover: #A6724E;
        --badge-bg: #F4E8D9;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

    body {
        background: var(--bg-color);
        color: var(--text-dark);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 20px 15px;
        padding-bottom: 100px; /* Space untuk cart melayang */
    }

    .container {
        width: 100%;
        max-width: 500px;
    }

    .header {
        text-align: center;
        margin-bottom: 25px;
        padding-top: 10px;
    }

    .badge {
        background: var(--badge-bg);
        color: var(--accent-hover);
        display: inline-block;
        padding: 6px 16px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 12px;
        letter-spacing: 0.5px;
    }

    .header h1 {
        font-size: 24px;
        font-weight: 700;
        color: var(--text-dark);
    }

    .header p {
        font-size: 13px;
        color: var(--text-light);
        margin-top: 5px;
    }

    /* Kategori Tabs */
    .categories {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 15px;
        margin-bottom: 10px;
        scrollbar-width: none;
    }
    .categories::-webkit-scrollbar { display: none; }
    
    .tab-btn {
        background: var(--card-bg);
        border: 1px solid #EAE0D5;
        color: var(--text-light);
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        transition: 0.3s ease;
    }
    .tab-btn.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
    }

    .menu {
        display: grid;
        gap: 15px;
    }

    .card {
        background: var(--card-bg);
        padding: 12px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        transition: transform 0.2s ease;
    }

    .card img {
        width: 75px;
        height: 75px;
        border-radius: 15px;
        object-fit: cover;
        background: #F0EBE1; /* Placeholder color */
    }

    .card-info { flex: 1; }

    .card-info h3 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
        line-height: 1.3;
    }

    .price {
        font-size: 14px;
        color: var(--accent);
        font-weight: 700;
    }

    .qty-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--bg-color);
        padding: 4px 8px;
        border-radius: 12px;
    }

    .qty-btn button {
        background: transparent;
        color: var(--text-dark);
        border: none;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
    }
    
    .qty-btn button:active { background: #E2D7C8; }
    .qty-btn span { font-size: 13px; font-weight: 600; min-width: 12px; text-align: center; }

    /* Floating Cart */
    .cart-wrapper {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 30px);
        max-width: 500px;
        z-index: 100;
    }

    .cart {
        background: var(--text-dark);
        color: #fff;
        padding: 16px 20px;
        border-radius: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 10px 25px rgba(74, 58, 54, 0.3);
    }

    .cart-info div:first-child {
        font-size: 12px;
        color: #D3C9C5;
    }

    .total {
        font-size: 18px;
        font-weight: 700;
        color: #fff;
    }

    .checkout {
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 10px 20px;
        border-radius: 14px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: 0.3s;
    }
    .checkout:hover { background: var(--accent-hover); }

    /* Modal Keranjang (Muncul saat mau checkout) */
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 999;
        justify-content: center;
        align-items: flex-end;
    }
    .modal-content {
        background: #fff;
        width: 100%;
        max-width: 500px;
        border-radius: 25px 25px 0 0;
        padding: 25px 20px;
        max-height: 80vh;
        overflow-y: auto;
    }
    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    .modal-header h2 { font-size: 18px; }
    .close-modal {
        background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-light);
    }
    .modal-item {
        display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px;
        border-bottom: 1px dashed #eee; padding-bottom: 8px;
    }
    .modal-btn-wa {
        width: 100%; padding: 14px; background: #25D366; color: #fff; border: none;
        border-radius: 15px; font-weight: 600; font-size: 15px; margin-top: 20px; cursor: pointer;
    }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="badge">✨ Promo Spesial</div>
        <h1>Pesan Minuman Favoritmu</h1>
        <p>Harga reseller lebih hemat, rasa tetap nikmat.</p>
    </div>

    <div class="categories" id="categoryTabs">
        <button class="tab-btn active" onclick="filterMenu('Semua')">Semua</button>
        <button class="tab-btn" onclick="filterMenu('Coffee')">Coffee</button>
        <button class="tab-btn" onclick="filterMenu('Non-Coffee')">Non-Coffee</button>
        <button class="tab-btn" onclick="filterMenu('Food')">Food & Toast</button>
    </div>

    <div class="menu" id="menuList"></div>
</div>

<div class="cart-wrapper" id="cartBar" style="display: none;">
    <div class="cart">
        <div class="cart-info">
            <div id="itemCount">0 Item</div>
            <div class="total">Rp <span id="totalPrice">0</span></div>
        </div>
        <button class="checkout" onclick="openModal()">Lihat Pesanan</button>
    </div>
</div>

<div class="modal-overlay" id="cartModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Rincian Pesanan</h2>
            <button class="close-modal" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalItems"></div>
        <button class="modal-btn-wa" onclick="checkoutWA()">Kirim Order via WhatsApp</button>
    </div>
</div>

<script>

    {name:"Donut Almond", price:13000, category:"Food", img:"images/donut-almond.jpg"},

    {name:"Roti Gulung Aren", price:13000, category:"Food", img:"images/roti-aren.jpg"},
    {name:"Roti Sisir Original", price:12000, category:"Food", img:"images/roti-sisir.jpg"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || {};
let currentFilter = "Semua";

// Render Menu dengan Filter
function renderMenu() {
    const menuList = document.getElementById("menuList");
    menuList.innerHTML = "";

    const filteredData = currentFilter === "Semua" 
        ? menuData 
        : menuData.filter(item => item.category === currentFilter);

    filteredData.forEach((item, index) => {
        const qty = cart[item.name] || 0;
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <img src="${item.img}" onerror="this.src='https://placehold.co/150x150/F0EBE1/8B7A75?text=${encodeURIComponent(item.name.substring(0,2))}'">
            <div class="card-info">
                <h3>${item.name}</h3>
                <div class="price">Rp ${formatRp(item.price)}</div>
            </div>
            <div class="qty-btn">
                <button onclick="changeQty('${item.name}', -1)">-</button>
                <span id="qty-${item.name}">${qty}</span>
                <button onclick="changeQty('${item.name}', 1)">+</button>
            </div>
        `;
        menuList.appendChild(card);
    });
}

// Filter Tab
function filterMenu(category) {
    currentFilter = category;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderMenu();
}

// Ubah Jumlah Beli
function changeQty(name, amount){
    if(!cart[name]) cart[name] = 0;
    cart[name] += amount;

    if(cart[name] <= 0) delete cart[name];

    localStorage.setItem("cart", JSON.stringify(cart));
    
    // Update angka di layar tanpa re-render semua
    const qtySpan = document.getElementById(`qty-${name}`);
    if(qtySpan) qtySpan.innerText = cart[name] || 0;
    
    updateCartUI();
}

// Update Keranjang Mengambang & Modal
function updateCartUI() {
    let totalHarga = 0;
    let totalItem = 0;
    const modalItems = document.getElementById("modalItems");
    modalItems.innerHTML = "";

    menuData.forEach(item => {
        const qty = cart[item.name];
        if(qty > 0) {
            const subtotal = qty * item.price;
            totalHarga += subtotal;
            totalItem += qty;
            
            modalItems.innerHTML += `
                <div class="modal-item">
                    <div><b>${item.name}</b> <br> <small>${qty}x @ Rp ${formatRp(item.price)}</small></div>
                    <div style="font-weight:600; color:#C28C65;">Rp ${formatRp(subtotal)}</div>
                </div>
            `;
        }
    });

    document.getElementById("itemCount").innerText = `${totalItem} Item`;
    document.getElementById("totalPrice").innerText = formatRp(totalHarga);

    const cartBar = document.getElementById("cartBar");
    if(totalItem > 0) {
        cartBar.style.display = "block";
    } else {
        cartBar.style.display = "none";
        closeModal();
    }
}

// Kontrol Modal
function openModal() { document.getElementById("cartModal").style.display = "flex"; }
function closeModal() { document.getElementById("cartModal").style.display = "none"; }

// Checkout ke WA
function checkoutWA(){
    let message = "Halo, saya mau order promo spesial:%0A%0A";
    let total = 0;

    menuData.forEach(item=>{
        const qty = cart[item.name];
        if(qty){
            const subtotal = qty * item.price;
            total += subtotal;
            message += `▪️ ${item.name}%0A  ${qty} x Rp ${formatRp(item.price)} = Rp ${formatRp(subtotal)}%0A`;
        }
    });

    message += `%0A*Total Pembayaran: Rp ${formatRp(total)}*%0A%0AMohon info ketersediaan dan metode pembayarannya ya. Terima kasih!`;
    window.open(`https://wa.me/${phone}?text=${message}`, "_blank");
}

// Inisialisasi awal
renderMenu();
updateCartUI();
</script>

</html>
